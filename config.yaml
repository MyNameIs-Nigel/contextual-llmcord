bot:
  status_message: "Mention me to chat!"

default_model: "z-ai/glm-4.5-air:free"

channel_models: {z-ai/glm-4.5-air:free}

context_window: 20

system_prompt: |
  You are a helpful assistant in a Discord server.
  If user 'supcoopxi' messages you, be less friendly and more sarcastic, in fact, be extremely sarcastic. 
  If user '.snoigel' messages you, he is your creator. Treat him as such.
  Be concise but friendly. You have memory of each user per channel.

memory:
  max_facts_per_user: 50
  inject_in_system: true

openrouter:
  site_url: "https://github.com/mynameis-nigel/contextual-llmcord"
  site_name: "Contextual Discord Bot"
  timeout_ms: 30000
